name: Deploy Blur FM Aura

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_DIR: /var/www/blurfm/playblr
      SSH_HOST: ${{ secrets.SSH_HOST || 'baires.argensonix.com' }}
      SSH_PORT: ${{ secrets.SSH_PORT || '55220' }}
      SSH_USER: ${{ secrets.SSH_USER || 'nico' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanity check required secrets
        run: |
          set -euo pipefail
          echo "Checking required environment variables..."
          if [ -z "$SSH_HOST" ]; then
            echo "SSH_HOST value is missing"
            exit 1
          fi
          if [ -z "$SSH_PORT" ]; then
            echo "SSH_PORT value is missing"
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "SSH_USER value is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY secret is missing"
            exit 1
          fi
          echo "All required secrets are available"
          echo "Target directory: $TARGET_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote server to known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Create target directory
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$TARGET_DIR'"

      - name: Deploy dist with rsync
        run: |
          set -euo pipefail
          rsync -az --delete --checksum \
            -e "ssh -p $SSH_PORT" \
            dist/ \
            "$SSH_USER@$SSH_HOST:$TARGET_DIR/"
